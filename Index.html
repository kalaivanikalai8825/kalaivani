<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalaivani — BCA Student & Aspiring Tech Hacker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Satisfy&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#000000;
    --bg-mid:#1A1A1A;
    --sage-1:#333333;
    --sage-2:#666666;
    --sage-3:#CCCCCC;
    --gold:#FFFFFF;
    --cream:#FFFFFF;
    --cream-dim:rgba(255,255,255,0.65);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html{scroll-behavior:smooth;}

  body{
    background:radial-gradient(ellipse at top, var(--bg-mid), var(--bg-deep) 70%);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
    position:relative;
    min-height:100vh;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }

  /* ---------- Bubble background ---------- */
  .bubble-field{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
    pointer-events:none;
  }
  .bubble{
    position:absolute;
    bottom:-150px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(200,200,200,0.55), rgba(100,100,100,0.12) 70%);
    border:1px solid rgba(200,200,200,0.25);
    animation:rise linear infinite;
  }
  @keyframes rise{
    0%{transform:translateY(0) translateX(0) scale(1); opacity:0;}
    8%{opacity:0.8;}
    50%{transform:translateY(-55vh) translateX(20px) scale(1.05);}
    90%{opacity:0.5;}
    100%{transform:translateY(-115vh) translateX(-15px) scale(0.9); opacity:0;}
  }

  /* ---------- Layout shell ---------- */
  .wrap{
    position:relative;
    z-index:1;
    max-width:880px;
    margin:0 auto;
    padding:0 24px;
  }

  section{
    padding:90px 0;
  }

  .eyebrow{
    font-family:'Inter',sans-serif;
    font-size:0.78rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--sage-2);
    margin-bottom:10px;
    font-weight:600;
  }

  h1,h2,h3{
    font-family:'Poppins',sans-serif;
  }

  /* ---------- Hero ---------- */
  .hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding-top:60px;
  }

  .photo-frame{
    position:relative;
    width:280px;
    height:280px;
    border-radius:50%;
    margin-bottom:28px;
  }
  .photo-frame-inner{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50%;
    will-change:transform;
    animation:gentle-tilt 3.8s ease-in-out infinite;
  }
  @keyframes gentle-tilt{
    0%,100%{ transform:translate(0,0) rotate(-2deg) scale(1); }
    25%{ transform:translate(-3px,2px) rotate(1.2deg) scale(1.01); }
    50%{ transform:translate(1px,-2px) rotate(-1.5deg) scale(0.99); }
    75%{ transform:translate(2px,1px) rotate(1.8deg) scale(1.01); }
  }
  @media (prefers-reduced-motion: reduce){
    .photo-frame-inner{ animation:none; }
  }
  .photo-frame::before{
    content:"";
    position:absolute;
    inset:-10px;
    border-radius:50%;
    background:conic-gradient(from 0deg, var(--gold), var(--sage-2), var(--gold), var(--sage-3), var(--gold));
    animation:spin 8s linear infinite;
    filter:blur(1px);
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .photo-frame img{
    position:relative;
    width:280px;
    height:280px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid var(--bg-deep);
    display:block;
  }

  .hero h1{
    font-family:'Satisfy', cursive;
    font-size:4.2rem;
    font-weight:400;
    letter-spacing:0.04em;
    margin-bottom:8px;
    line-height:1;
    filter:
      drop-shadow(2px 2px 0px rgba(50,50,50,0.9))
      drop-shadow(4px 4px 0px rgba(40,40,40,0.7))
      drop-shadow(6px 6px 0px rgba(30,30,30,0.5))
      drop-shadow(8px 8px 12px rgba(0,0,0,0.4));
  }
  .hero h1 span{
    font-weight:inherit;
    text-shadow:inherit;
  }
  @media (prefers-reduced-motion: reduce){
    .hero h1{ filter:none; }
  }
  .hero .tagline{
    font-size:1.05rem;
    color:var(--cream-dim);
    max-width:480px;
    margin:0 auto 28px;
    line-height:1.6;
  }
  .hero .tagline strong{ color:var(--gold); font-weight:600; }

  .hero-pills{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .pill{
    border:1px solid rgba(200,200,200,0.35);
    background:rgba(150,150,150,0.08);
    border-radius:999px;
    padding:8px 18px;
    font-size:0.85rem;
    color:var(--sage-3);
  }

  .scroll-cue{
    margin-top:56px;
    font-size:0.75rem;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--sage-1);
    opacity:0.8;
  }

  /* ---------- Section heading ---------- */
  .section-head h2{
    font-size:2rem;
    font-weight:700;
    margin-bottom:36px;
  }

  /* ---------- Education timeline ---------- */
  .timeline{
    position:relative;
    padding-left:28px;
    border-left:2px solid rgba(150,150,150,0.3);
  }
  .t-item{
    position:relative;
    padding-bottom:36px;
  }
  .t-item:last-child{ padding-bottom:0; }
  .t-item::before{
    content:"";
    position:absolute;
    left:-34.5px;
    top:4px;
    width:13px;
    height:13px;
    border-radius:50%;
    background:var(--gold);
    box-shadow:0 0 0 4px var(--bg-deep), 0 0 12px rgba(255,255,255,0.6);
  }
  .t-item .t-label{
    font-size:0.78rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--sage-2);
    margin-bottom:4px;
  }
  .t-item .t-score{
    font-family:'Poppins',sans-serif;
    font-size:1.5rem;
    font-weight:700;
    color:var(--cream);
  }
  .t-item .t-score span{
    font-size:0.95rem;
    font-weight:400;
    color:var(--cream-dim);
    margin-left:6px;
  }
  .t-bar{
    margin-top:10px;
    height:6px;
    border-radius:4px;
    background:rgba(200,200,200,0.12);
    overflow:hidden;
    max-width:280px;
  }
  .t-bar > span{
    display:block;
    height:100%;
    border-radius:4px;
    background:linear-gradient(90deg, var(--sage-1), var(--gold));
    width:0%;
    transition:width 1.2s ease;
  }

  .current-study{
    margin-top:40px;
    padding:22px 24px;
    border-radius:16px;
    background:rgba(100,100,100,0.12);
    border:1px solid rgba(150,150,150,0.25);
  }
  .current-study .t-label{ color:var(--gold); }
  .current-study h3{
    font-size:1.2rem;
    margin-top:4px;
    font-weight:600;
  }
  .current-study p{
    color:var(--cream-dim);
    font-size:0.92rem;
    margin-top:6px;
  }

  /* ---------- Skills ---------- */
  .skills-grid{
    display:grid;
    gap:22px;
  }
  .skill-row{
    display:grid;
    grid-template-columns:170px 1fr 50px;
    align-items:center;
    gap:16px;
  }
  .skill-name{
    font-size:0.95rem;
    color:var(--cream);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .skill-bar{
    height:8px;
    border-radius:4px;
    background:rgba(200,200,200,0.12);
    overflow:hidden;
  }
  .skill-bar > span{
    display:block;
    height:100%;
    border-radius:4px;
    background:linear-gradient(90deg, var(--sage-2), var(--gold));
    width:0%;
    transition:width 1.4s ease;
  }
  .skill-pct{
    font-family:'Poppins',sans-serif;
    font-weight:600;
    font-size:0.9rem;
    color:var(--gold);
    text-align:right;
  }

  /* ---------- Goals ---------- */
  .goals-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }
  .goal-card{
    background:rgba(100,100,100,0.1);
    border:1px solid rgba(150,150,150,0.22);
    border-radius:18px;
    padding:26px 22px;
    transition:transform 0.25s ease, border-color 0.25s ease;
  }
  .goal-card:hover{
    transform:translateY(-4px);
    border-color:var(--gold);
  }
  .goal-card .icon{ font-size:1.8rem; margin-bottom:10px; display:block; }
  .goal-card h3{ font-size:1.15rem; margin-bottom:6px; }
  .goal-card p{ font-size:0.88rem; color:var(--cream-dim); line-height:1.5; }

  /* Featured / highlighted goal card */
  .goal-card.featured{
    grid-column:1 / -1;
    background:linear-gradient(135deg, rgba(255,255,255,0.16), rgba(100,100,100,0.14));
    border:1px solid rgba(255,255,255,0.55);
    box-shadow:0 0 0 1px rgba(255,255,255,0.15), 0 12px 36px rgba(255,255,255,0.18);
    padding:34px 30px;
    position:relative;
    overflow:hidden;
    animation:glow-pulse 3.2s ease-in-out infinite;
  }
  .goal-card.featured::before{
    content:"⭐ TOP GOAL";
    position:absolute;
    top:16px;
    right:18px;
    font-family:'Poppins',sans-serif;
    font-size:0.68rem;
    letter-spacing:0.12em;
    font-weight:700;
    color:var(--bg-deep);
    background:var(--gold);
    padding:5px 12px;
    border-radius:999px;
  }
  .goal-card.featured .icon{ font-size:2.6rem; }
  .goal-card.featured h3{ font-size:1.5rem; font-weight:700; color:var(--cream); }
  .goal-card.featured p{ font-size:0.95rem; max-width:520px; }
  @keyframes glow-pulse{
    0%,100%{ box-shadow:0 0 0 1px rgba(255,255,255,0.15), 0 12px 36px rgba(255,255,255,0.18); }
    50%{ box-shadow:0 0 0 1px rgba(255,255,255,0.35), 0 16px 48px rgba(255,255,255,0.32); }
  }
  @media (prefers-reduced-motion: reduce){
    .goal-card.featured{ animation:none; }
  }

  /* ---------- Interests ---------- */
  .interest-row{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
  }
  .interest-chip{
    border:1px solid rgba(255,255,255,0.4);
    background:rgba(255,255,255,0.08);
    color:var(--gold);
    border-radius:999px;
    padding:10px 20px;
    font-size:0.9rem;
    font-weight:500;
  }

  /* ---------- Projects ---------- */
  .projects-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }
  .project-card{
    background:rgba(150,150,150,0.07);
    border:1px dashed rgba(150,150,150,0.35);
    border-radius:18px;
    padding:26px 22px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .project-card .proj-icon{ font-size:1.6rem; }
  .project-card h3{ font-size:1.05rem; font-weight:600; }
  .project-card p{ font-size:0.86rem; color:var(--cream-dim); line-height:1.5; }
  .project-card .proj-status{
    align-self:flex-start;
    font-size:0.72rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-weight:700;
    color:var(--gold);
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.3);
    border-radius:999px;
    padding:4px 12px;
    margin-top:4px;
  }

  /* ---------- Certificates ---------- */
  .cert-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:16px;
  }
  .cert-card{
    background:rgba(150,150,150,0.07);
    border:1px solid rgba(150,150,150,0.22);
    border-radius:16px;
    padding:24px 16px;
    text-align:center;
  }
  .cert-card .cert-icon{ font-size:1.8rem; display:block; margin-bottom:10px; }
  .cert-card p{ font-size:0.85rem; color:var(--cream-dim); }

  /* ---------- Languages ---------- */
  .lang-grid{
    display:grid;
    gap:16px;
  }
  .lang-row{
    display:grid;
    grid-template-columns:140px 1fr 90px;
    align-items:center;
    gap:16px;
  }
  .lang-name{ font-size:0.95rem; display:flex; align-items:center; gap:8px; }
  .lang-bar{
    height:8px;
    border-radius:4px;
    background:rgba(150,150,150,0.12);
    overflow:hidden;
  }
  .lang-bar > span{
    display:block;
    height:100%;
    border-radius:4px;
    background:linear-gradient(90deg, var(--sage-2), var(--gold));
    width:0%;
    transition:width 1.4s ease;
  }
  .lang-level{
    font-size:0.82rem;
    color:var(--sage-3);
    text-align:right;
  }

  /* ---------- Contact ---------- */
  .contact-box{
    background:rgba(0,0,0,0.6);
    border:1px solid rgba(150,150,150,0.25);
    border-radius:22px;
    padding:40px;
  }
  .contact-box form{
    display:grid;
    gap:16px;
    margin-top:24px;
  }
  .contact-box label{
    font-size:0.8rem;
    color:var(--sage-2);
    margin-bottom:6px;
    display:block;
  }
  .contact-box input,
  .contact-box textarea{
    width:100%;
    background:rgba(245,245,236,0.05);
    border:1px solid rgba(200,200,200,0.25);
    border-radius:10px;
    padding:12px 14px;
    color:var(--cream);
    font-family:'Inter',sans-serif;
    font-size:0.95rem;
  }
  .contact-box input:focus,
  .contact-box textarea:focus{
    outline:2px solid var(--gold);
    outline-offset:1px;
  }
  .contact-box textarea{ resize:vertical; min-height:110px; }
  .send-btn{
    justify-self:start;
    background:var(--gold);
    color:var(--bg-deep);
    border:none;
    border-radius:999px;
    padding:13px 32px;
    font-family:'Poppins',sans-serif;
    font-weight:700;
    font-size:0.95rem;
    cursor:pointer;
    transition:transform 0.2s ease, box-shadow 0.2s ease;
  }
  .send-btn:hover{ transform:translateY(-2px); box-shadow:0 8px 24px rgba(255,255,255,0.35); }
  .send-btn:focus-visible{ outline:3px solid var(--cream); outline-offset:2px; }
  .form-note{
    font-size:0.82rem;
    color:var(--cream-dim);
    margin-top:14px;
  }

  .social-row{
    display:flex;
    gap:14px;
    margin-top:22px;
  }
  .social-row a{
    color:var(--cream);
    text-decoration:none;
    border:1px solid rgba(200,200,200,0.3);
    border-radius:999px;
    padding:9px 18px;
    font-size:0.88rem;
    transition:border-color 0.2s ease, color 0.2s ease;
  }
  .social-row a:hover{ border-color:var(--gold); color:var(--gold); }
  .social-row a:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

  footer{
    text-align:center;
    padding:36px 0 50px;
    color:var(--cream-dim);
    font-size:0.82rem;
    position:relative;
    z-index:1;
  }

  /* ---------- Responsive ---------- */
  @media (max-width:640px){
    .hero h1{ font-size:3rem; }
    .goals-grid{ grid-template-columns:1fr; }
    .skill-row{ grid-template-columns:120px 1fr 42px; gap:10px; }
    section{ padding:64px 0; }
    .contact-box{ padding:28px 22px; }
    .projects-grid{ grid-template-columns:1fr; }
    .cert-grid{ grid-template-columns:1fr 1fr; }
    .lang-row{ grid-template-columns:90px 1fr 70px; gap:10px; }
  }

  /* fade-in on scroll */
  .fade-up{
    opacity:0;
    transform:translateY(24px);
    transition:opacity 0.7s ease, transform 0.7s ease;
  }
  .fade-up.in{
    opacity:1;
    transform:translateY(0);
  }
</style>
</head>
